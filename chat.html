<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GuestChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="chat-body">
  <div class="grain"></div>

  <div class="app-shell">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <header class="sidebar-head">
        <div class="brand small">
          <span class="brand-dot"></span>
          <span class="brand-name">guestchat</span>
        </div>
        <button class="icon-btn" id="logout-btn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </header>

      <div class="me-card">
        <div class="avatar" id="my-avatar">?</div>
        <div class="me-info">
          <div class="me-name" id="my-username">loading...</div>
          <div class="me-status"><span class="dot-online"></span>online</div>
        </div>
      </div>

      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" id="search-input" placeholder="find a guest by name..." />
        <button class="search-clear" id="search-clear" style="display:none;">✕</button>
      </div>

      <nav class="room-nav">
        <button class="room-btn active" data-room="global" id="global-room-btn">
          <span class="room-icon">◉</span>
          <span class="room-label">global chatroom</span>
        </button>
      </nav>

      <div class="section-label">
        <span>online now</span>
        <span class="count-badge" id="online-count">0</span>
      </div>

      <ul class="user-list" id="online-users"></ul>

      <div class="section-label" id="search-label" style="display:none;">
        <span>search results</span>
      </div>
      <ul class="user-list" id="search-results"></ul>

      <div class="section-label" id="recent-label">
        <span>recent chats</span>
      </div>
      <ul class="user-list" id="recent-chats"></ul>
    </aside>

    <!-- MAIN CHAT AREA -->
    <main class="chat-main">
      <header class="chat-head">
        <div class="chat-head-info">
          <div class="avatar" id="chat-avatar">◉</div>
          <div>
            <div class="chat-title" id="chat-title">global chatroom</div>
            <div class="chat-sub" id="chat-sub">everyone's here</div>
          </div>
        </div>
      </header>

      <div class="messages-area" id="messages-area">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">✦</div>
          <p>no messages yet — be the first to say something</p>
        </div>
      </div>

      <footer class="composer">
        <button class="icon-btn upload-btn" id="upload-btn" title="Upload image or video (max 10MB)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <input type="file" id="file-input" accept="image/*,video/*" hidden />

        <div class="upload-preview" id="upload-preview" style="display:none;">
          <span id="upload-filename"></span>
          <button id="upload-cancel">✕</button>
        </div>

        <textarea
          id="message-input"
          placeholder="say something..."
          rows="1"
        ></textarea>

        <button class="btn-send" id="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </footer>

      <div class="upload-progress" id="upload-progress" style="display:none;">
        <div class="upload-progress-bar" id="upload-progress-bar"></div>
        <span id="upload-progress-text">uploading...</span>
      </div>
    </main>
  </div>

  <!-- Image/video lightbox -->
  <div class="lightbox" id="lightbox" style="display:none;">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <div class="lightbox-content" id="lightbox-content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/presence.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
